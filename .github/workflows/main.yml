name: Build Siksok AI APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK with ABI Filtering
        run: ./gradlew assembleDebug
        env:
          # Build sürecini 32-bit (armeabi-v7a) mimarisine zorlar
          ORG_GRADLE_PROJECT_android_injected_build_abi: armeabi-v7a

      - name: Upload Siksok AI APK
        uses: actions/upload-artifact@v4
        with:
          name: Siksok-AI-APK
          path: app/build/outputs/apk/debug/app-debug.apk
